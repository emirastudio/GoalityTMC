<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#2BFEBA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2BFEBA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0E14"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Dot grid -->
  <pattern id="d" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.5" fill="white" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#d)"/>

  <!-- Decorative rings -->
  <circle cx="910" cy="190" r="160" fill="none" stroke="#60A5FA" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="910" cy="190" r="110" fill="none" stroke="#60A5FA" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="910" cy="190" r="60" fill="#60A5FA" fill-opacity="0.03"/>

  <circle cx="280" cy="450" r="90" fill="none" stroke="#2BFEBA" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="280" cy="450" r="45" fill="#2BFEBA" fill-opacity="0.02"/>

  <!-- Accent dash top-left -->
  <rect x="60" y="60" width="40" height="3" rx="1.5" fill="#60A5FA" opacity="0.5"/>
  <rect x="60" y="70" width="24" height="3" rx="1.5" fill="#60A5FA" opacity="0.3"/>

  <!-- Goality mark bottom-right -->
  <text x="1140" y="590" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#60A5FA" fill-opacity="0.2" font-weight="700" text-anchor="end" letter-spacing="1.5">GOALITY TMC</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bar)"/>
</svg>