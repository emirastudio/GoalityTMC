name: Deploy to production

# Immutable deploy. Runs AFTER "Build & push image" succeeds on main.
# The server never builds — it only pulls the exact image CI produced,
# runs DB migrations as a one-shot, and atomically swaps the container.
# Auto-rolls-back to the previous image if health/integrity checks fail.
#
# Required GitHub repo secrets:
#   DEPLOY_SSH_KEY      — ed25519 private key; matching pubkey in
#                         root@goality.ee:~/.ssh/authorized_keys
#   DEPLOY_KNOWN_HOSTS  — `ssh-keyscan goality.ee` output
# Server prerequisites (one-time, already done):
#   /home/goality/.ghcr-token  — GH PAT (read:packages), chmod 600
#   /home/goality/app/.env.local — runtime secrets

on:
  workflow_run:
    workflows: ["Build & push image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve deploy SHA
        id: sha
        run: |
          SHA="${{ github.event.inputs.sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "value=$SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying $SHA"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H goality.ee >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Pull image, migrate, swap container, verify (with rollback)
        run: |
          DEPLOY_SHA="${{ steps.sha.outputs.value }}"
          DEPLOY_TS=$(date -u +%FT%TZ)
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ssh -i ~/.ssh/id_ed25519 root@goality.ee \
            "DEPLOY_SHA=$DEPLOY_SHA DEPLOY_TS=$DEPLOY_TS OWNER=$OWNER bash -se" <<'EOF'
          set -euo pipefail
          IMG="ghcr.io/${OWNER}/goalitytmc:${DEPLOY_SHA}"
          UP=/home/goality/app/public/uploads
          ENVF=/home/goality/app/.env.local
          run_app() {  # $1 = image ref
            docker rm -f goality-app >/dev/null 2>&1 || true
            docker run -d --name goality-app --network host \
              -e PORT=3001 -e HOSTNAME=0.0.0.0 \
              --env-file "$ENVF" -v "$UP":/app/public/uploads \
              --restart unless-stopped "$1" >/dev/null
          }

          echo "→ GHCR login"
          cat /home/goality/.ghcr-token | docker login ghcr.io -u emirastudio --password-stdin >/dev/null

          PREV=$(docker inspect goality-app --format '{{.Config.Image}}' 2>/dev/null || echo "")
          echo "→ Previous image: ${PREV:-<none>}"

          echo "→ Pull $IMG"
          docker pull "$IMG" >/dev/null

          echo "→ Migrate (idempotent, pre-swap)"
          docker run --rm --network host --env-file "$ENVF" "$IMG" node scripts/migrate.mjs

          echo "→ Swap container"
          run_app "$IMG"

          echo "→ Healthcheck (/api/version SHA)"
          OK=false
          for i in $(seq 1 20); do
            sleep 3
            S=$(curl -fsS --max-time 5 http://127.0.0.1:3001/api/version 2>/dev/null \
                 | python3 -c 'import json,sys;print(json.load(sys.stdin).get("sha","?"))' 2>/dev/null || echo "?")
            if [ "${S:0:7}" = "${DEPLOY_SHA:0:7}" ]; then OK=true; echo "  ✓ serving $S"; break; fi
          done

          # Smoke key routes against the NEW container (127.0.0.1:3001).
          # Each must return an allowed status or the deploy rolls back.
          if [ "$OK" = true ]; then
            smoke() {  # $1=path  $2=allowed-codes(csv)
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 12 \
                "http://127.0.0.1:3001$1" 2>/dev/null || echo 000)
              case ",$2," in *",$code,"*) echo "  ✓ $1 → $code" ;;
                *) echo "  ✗ $1 → $code (expected $2)"; OK=false ;; esac
            }
            smoke /en 200
            smoke /ru 200
            smoke /en/catalog 200
            smoke /ru/t/together-to-goals/monkey-cup 200
            smoke /en/clubs/fci-levadia 200
            smoke /ru/t/monkey-cup/register 200,301,302,307,308
          fi

          if [ "$OK" = true ]; then
            INTEG=$(curl -fsS --max-time 10 \
              "http://127.0.0.1:3001/api/health/registration-integrity?windowMinutes=120" 2>/dev/null \
              | jq -r '.ok // false' 2>/dev/null || echo false)
            [ "$INTEG" = true ] || { echo "✗ integrity check failed"; OK=false; }
          fi

          if [ "$OK" != true ]; then
            echo "✗ Deploy unhealthy — rolling back to ${PREV:-<none>}"
            if [ -n "$PREV" ]; then run_app "$PREV"; fi
            exit 1
          fi

          docker image prune -f >/dev/null 2>&1 || true
          mkdir -p /home/goality/deploys
          echo "${DEPLOY_TS}  ${DEPLOY_SHA}  ghcr-deploy" >> /home/goality/deploys/log.tsv
          echo "✓ Deployed $DEPLOY_SHA (immutable)"
          EOF
