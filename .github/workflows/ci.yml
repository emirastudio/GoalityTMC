name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Lint is informational for now: ~200 pre-existing errors we haven't
      # cleaned up yet. Blocking on them would block all deploys. Tech debt
      # — clean incrementally (touched files), then flip to blocking.
      - name: Lint (non-blocking)
        run: pnpm lint
        continue-on-error: true

      # ── GATES (must pass — they block the image build & deploy) ──
      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      # Build is the artifact's job (docker.yml builds the prod image,
      # gated on this CI succeeding). We don't double-build here — typecheck
      # + test are the fast gate; the real `next build` runs in docker.yml.
